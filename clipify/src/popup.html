<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clipify</title>
    <style>
      :root {
        --bg: #2b2b2b;
        --line: #454545;
        --text: #d8d8d8;
        --dim: #8a8a8a;
        --accent: #f5a623;
        --wave: #9a9a9a;
        --strip: rgba(245, 166, 35, 0.16);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font: 12px/1.35 -apple-system, "Segoe UI", system-ui, sans-serif;
        user-select: none;
      }
      .wrap { padding: 12px 14px; display: flex; flex-direction: column; height: 100%; gap: 10px; }
      h1 { font-size: 14px; font-weight: 600; margin: 0; }
      .head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
      .subtitle { color: var(--dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .count { color: var(--accent); font-size: 11px; font-variant-numeric: tabular-nums; white-space: nowrap; }
      canvas { width: 100%; height: 92px; display: block; background: #262626; border-radius: 4px; }
      .section { color: var(--dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; border-top: 1px solid var(--line); padding-top: 8px; margin-top: 2px; }
      .ctl { display: flex; align-items: center; gap: 10px; }
      .ctl > label { color: var(--dim); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; width: 64px; flex: none; }
      .seg { display: flex; flex: 1; background: #262626; border-radius: 5px; overflow: hidden; }
      .seg button {
        flex: 1; appearance: none; border: 0; background: transparent; color: var(--dim);
        padding: 6px 6px; font: inherit; cursor: pointer; border-right: 1px solid var(--line);
      }
      .seg button:last-child { border-right: 0; }
      .seg button.on { background: #4a4a4a; color: var(--text); }
      /* custom-painted track so the fill keeps its colour when the window is inactive
         (accent-color greys out on blur) */
      input[type=range] { flex: 1; margin: 0; height: 14px; cursor: pointer; -webkit-appearance: none; appearance: none; background: transparent; }
      input[type=range]::-webkit-slider-runnable-track {
        height: 4px; border-radius: 2px;
        background: linear-gradient(to right, var(--accent) 0 var(--fill, 50%), #3a3a3a var(--fill, 50%) 100%);
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; margin-top: -4px; width: 12px; height: 12px; border-radius: 50%; background: #d8d8d8;
      }
      .hide { display: none; }
      .foot { margin-top: auto; display: flex; justify-content: flex-end; gap: 8px; }
      .foot button { appearance: none; border: 0; border-radius: 5px; padding: 7px 16px; font: inherit; cursor: pointer; }
      .btn-cancel { background: #4a4a4a; color: var(--text); }
      .btn-apply { background: var(--accent); color: #1c1c1c; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>Clipify</h1>
        <span class="count" id="count"></span>
      </div>
      <div class="subtitle" id="subtitle"></div>
      <canvas id="wave" width="800" height="184"></canvas>

      <div class="section">Splits</div>

      <div class="ctl">
        <label>Mode</label>
        <div class="seg" id="mode">
          <button data-val="MACRO">MACRO</button>
          <button data-val="MICRO">MICRO</button>
        </div>
      </div>

      <div class="ctl">
        <label>Cuts</label>
        <div class="seg" id="cutat">
          <button data-val="start">Start</button>
          <button data-val="end">End</button>
          <button data-val="both">Both</button>
        </div>
      </div>

      <div class="ctl">
        <label>Sensitivity</label>
        <input type="range" id="sens" min="0" max="1" step="0.01" />
      </div>

      <div class="section">Strip</div>

      <div class="ctl">
        <label>Action</label>
        <div class="seg" id="strip">
          <button data-val="off">Off</button>
          <button data-val="deactivate">Deactivate</button>
          <button data-val="delete">Delete</button>
        </div>
      </div>

      <div class="ctl hide" id="thresh-row">
        <label>Target</label>
        <div class="seg" id="thresh">
          <button data-val="silence">Silence</button>
          <button data-val="quiet">Quiet</button>
          <button data-val="content">Content</button>
        </div>
      </div>

      <div class="ctl hide" id="silence-row">
        <label>Silence</label>
        <input type="range" id="silence" min="0" max="1" step="0.01" />
      </div>

      <div class="foot">
        <button class="btn-cancel" onclick="onCancel()">Cancel</button>
        <button class="btn-apply" onclick="onApply()">Slice</button>
      </div>
    </div>

    <script>
      var DATA = __DATA__;
      // MACRO and MICRO keep their own sensitivity; the one slider swaps between them.
      var state = {
        mode: DATA.defaults.mode,
        cutAt: DATA.defaults.cutAt,
        strip: DATA.defaults.strip,
        thresh: DATA.defaults.thresh,
        sensMacro: DATA.defaults.sensMacro,
        sensMicro: DATA.defaults.sensMicro,
        silence: DATA.defaults.silence,
      };
      var current = { cutBeats: [], strips: [] };

      function el(id) { return document.getElementById(id); }
      function geom(a, b, u) { return a * Math.pow(b / a, u); } // geometric interp
      function lerp(a, b, t) { return a + (b - a) * t; }
      function sens() { return state.mode === "MACRO" ? state.sensMacro : state.sensMicro; }
      function setSens(v) { if (state.mode === "MACRO") state.sensMacro = v; else state.sensMicro = v; }

      // gap-duration threshold (seconds): each mode's sweet spot sits at the slider
      // centre, with conservative/aggressive range opening up on either side.
      function thresholdFor(mode, s) {
        if (mode === "MACRO") {
          return s < 0.5 ? geom(1.5, 0.7, s / 0.5) : geom(0.7, 0.1, (s - 0.5) / 0.5);
        }
        return s < 0.5 ? geom(0.5, 0.02, s / 0.5) : geom(0.02, 0.006, (s - 0.5) / 0.5);
      }

      function selectCuts() {
        var thresh = thresholdFor(state.mode, sens());
        var sil = state.silence; // 0.5 = the detected silence (== the split cut)
        var cutBeats = [], strips = [], drawCuts = [], drawStrips = [];
        var EPS = 0.001;
        var stripping = state.strip !== "off";

        var eligible = DATA.candidates.filter(function (c) {
          return c.edge || (c.durSec >= thresh && (state.mode !== "MACRO" || c.quiet.hasDeep));
        });

        // strip zone, centred on the active threshold's silence extent (where the split
        // cut lands): below 0.5 shrinks inward, above 0.5 extends toward the notes.
        function pushZone(c, ext) {
          var b0, b1, f0, f1;
          if (sil >= 0.5) {
            var u = (sil - 0.5) / 0.5;
            b0 = lerp(ext.cutBeat, c.gapStartBeat, u); b1 = lerp(ext.deepEndBeat, c.gapEndBeat, u);
            f0 = lerp(ext.cutFrac, c.gapStartFrac, u); f1 = lerp(ext.deepEndFrac, c.gapEndFrac, u);
          } else {
            var k = ((0.5 - sil) / 0.5) * 0.7;
            var mB = (ext.cutBeat + ext.deepEndBeat) / 2, mF = (ext.cutFrac + ext.deepEndFrac) / 2;
            b0 = lerp(ext.cutBeat, mB, k); b1 = lerp(ext.deepEndBeat, mB, k);
            f0 = lerp(ext.cutFrac, mF, k); f1 = lerp(ext.deepEndFrac, mF, k);
          }
          cutBeats.push(b0, b1); strips.push({ start: b0, end: b1 });
          drawCuts.push(f0, f1); drawStrips.push({ f0: f0, f1: f1 });
        }

        // CONTENT strip: cut at the quiet silence boundaries, strip the SOUND between them
        if (stripping && state.thresh === "content") {
          var sorted = eligible.filter(function (c) { return c.quiet.hasDeep; })
            .sort(function (a, b) { return a.quiet.cutBeat - b.quiet.cutBeat; });
          var pb = DATA.winStartBeat, pf = 0;
          sorted.forEach(function (c) {
            if (c.quiet.cutFrac - pf > EPS) {
              cutBeats.push(pb, c.quiet.cutBeat); strips.push({ start: pb, end: c.quiet.cutBeat });
              drawCuts.push(pf, c.quiet.cutFrac); drawStrips.push({ f0: pf, f1: c.quiet.cutFrac });
            }
            pb = c.quiet.deepEndBeat; pf = c.quiet.deepEndFrac;
          });
          if (1 - pf > EPS) {
            cutBeats.push(pb, DATA.winEndBeat); strips.push({ start: pb, end: DATA.winEndBeat });
            drawCuts.push(pf, 1); drawStrips.push({ f0: pf, f1: 1 });
          }
        } else {
          // split (phrase edges) or silence/quiet strip
          var atEnd = state.cutAt !== "start";
          var atStart = state.cutAt !== "end";
          eligible.forEach(function (c) {
            var ext = state.thresh === "silence" ? c.silence : c.quiet;
            if (stripping && ext.hasDeep) {
              pushZone(c, ext);
            } else if (!stripping) {
              if (!ext.hasDeep) { cutBeats.push(ext.cutBeat); drawCuts.push(ext.cutFrac); }
              else {
                if (atEnd && ext.cutFrac > EPS) { cutBeats.push(ext.cutBeat); drawCuts.push(ext.cutFrac); }
                if (atStart && ext.deepEndFrac < 1 - EPS) { cutBeats.push(ext.deepEndBeat); drawCuts.push(ext.deepEndFrac); }
              }
            }
          });
        }
        current = { cutBeats: cutBeats, strips: strips };
        draw(drawCuts, drawStrips);
        var pieces = cutBeats.length + 1;
        var label = pieces + (pieces === 1 ? " slice" : " slices");
        if (strips.length) label += " · " + strips.length + " stripped";
        el("count").textContent = label;
      }

      function draw(cuts, strips) {
        var cv = el("wave"), g = cv.getContext("2d");
        var W = cv.width, H = cv.height, mid = H / 2;
        var css = getComputedStyle(document.documentElement);
        g.clearRect(0, 0, W, H);

        g.fillStyle = css.getPropertyValue("--strip");
        strips.forEach(function (r) {
          g.fillRect(r.f0 * W, 0, Math.max(1, (r.f1 - r.f0) * W), H);
        });

        var nf = (DATA.noiseFloorLevel || 0) * mid;
        g.strokeStyle = "#3a3a3a"; g.lineWidth = 1;
        g.beginPath();
        g.moveTo(0, mid - nf); g.lineTo(W, mid - nf);
        g.moveTo(0, mid + nf); g.lineTo(W, mid + nf); g.stroke();

        var env = DATA.envelope, n = env.length;
        g.strokeStyle = css.getPropertyValue("--wave");
        g.beginPath();
        for (var i = 0; i < n; i++) {
          var x = (i / n) * W, h = env[i] * mid;
          g.moveTo(x, mid - h); g.lineTo(x, mid + h);
        }
        g.stroke();

        g.strokeStyle = css.getPropertyValue("--accent"); g.lineWidth = 1.5;
        g.beginPath();
        cuts.forEach(function (f) { g.moveTo(f * W, 0); g.lineTo(f * W, H); });
        g.stroke();
      }

      function bindSeg(id, key, after) {
        var box = el(id);
        box.querySelectorAll("button").forEach(function (b) {
          b.addEventListener("click", function () {
            state[key] = b.getAttribute("data-val");
            box.querySelectorAll("button").forEach(function (x) { x.classList.toggle("on", x === b); });
            if (after) after();
            selectCuts();
          });
          b.classList.toggle("on", b.getAttribute("data-val") === state[key]);
        });
      }

      function sendResult(payload) {
        var msg = JSON.stringify(payload);
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live) {
          window.webkit.messageHandlers.live.postMessage({ method: "close_and_send", params: [msg] });
        } else if (window.chrome && window.chrome.webview) {
          window.chrome.webview.postMessage({ method: "close_and_send", params: [msg] });
        }
      }

      function onCancel() { sendResult({ action: "cancel" }); }
      function onApply() {
        sendResult({
          action: "apply",
          cutBeats: current.cutBeats,
          strips: current.strips,
          stripAction: state.strip,
          // persisted for next run
          settings: {
            mode: state.mode,
            cutAt: state.cutAt,
            sensMacro: state.sensMacro,
            sensMicro: state.sensMicro,
            strip: state.strip,
            thresh: state.thresh,
            silence: state.silence,
          },
        });
      }

      function fill(input) { input.style.setProperty("--fill", input.value * 100 + "%"); }

      function wireSlider(id, get, set) {
        var input = el(id);
        input.value = get();
        fill(input);
        input.addEventListener("input", function () { set(parseFloat(this.value)); fill(this); selectCuts(); });
        input.addEventListener("dblclick", function () { this.value = 0.5; set(0.5); fill(this); selectCuts(); }); // reset to mid
        return input;
      }

      function toggleStripRows() {
        var off = state.strip === "off";
        el("thresh-row").classList.toggle("hide", off);
        el("silence-row").classList.toggle("hide", off);
      }

      window.onload = function () {
        el("subtitle").textContent = DATA.meta.subtitle || "";
        var sensEl = wireSlider("sens", sens, setSens);
        wireSlider("silence", function () { return state.silence; }, function (v) { state.silence = v; });

        bindSeg("mode", "mode", function () { sensEl.value = sens(); fill(sensEl); }); // swap slider to the mode's value
        bindSeg("cutat", "cutAt");
        bindSeg("thresh", "thresh");
        bindSeg("strip", "strip", toggleStripRows);
        toggleStripRows();
        selectCuts();
      };
    </script>
  </body>
</html>
