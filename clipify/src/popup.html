<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clipify</title>
    <style>
      :root {
        --bg: #2b2b2b;
        --line: #444;
        --text: #d8d8d8;
        --dim: #8a8a8a;
        --accent: #f5a623;
        --wave: #9a9a9a;
        --strip: rgba(245, 166, 35, 0.16);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%;
        background: var(--bg); color: var(--text);
        font: 11px/1.3 -apple-system, "Segoe UI", system-ui, sans-serif;
        user-select: none;
      }
      .wrap { padding: 10px 12px; display: flex; flex-direction: column; height: 100%; gap: 7px; }
      h1 { font-size: 13px; font-weight: 600; margin: 0; }
      .head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
      .subtitle { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .count { color: var(--accent); font-variant-numeric: tabular-nums; white-space: nowrap; }
      canvas { width: 100%; height: 84px; display: block; background: #262626; border-radius: 4px; }

      .section { display: flex; align-items: center; gap: 9px; color: var(--text); font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; border-top: 1px solid var(--line); padding-top: 10px; margin-top: 4px; }
      .toggle { width: 13px; height: 13px; border-radius: 3px; background: var(--accent); cursor: pointer; flex: none; }
      .toggle.off { background: #555; }
      .body { display: flex; flex-direction: column; gap: 6px; padding-left: 22px; padding-top: 6px; }
      .body.hide { display: none; }

      .row { display: flex; align-items: center; gap: 12px; }
      .row > label { width: 52px; flex: none; color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
      .row > .seg, .row > input { flex: 1; }
      .row > .val { width: 38px; flex: none; text-align: right; color: var(--dim); font-variant-numeric: tabular-nums; }
      .seg { display: flex; background: #303030; border: 1px solid var(--line); border-radius: 5px; overflow: hidden; }
      .seg button {
        flex: 1; appearance: none; border: 0; background: transparent; color: var(--dim);
        padding: 5px 6px; font: inherit; cursor: pointer; border-right: 1px solid var(--line); white-space: nowrap;
      }
      .seg button:last-child { border-right: 0; }
      .seg button.on { background: #585858; color: #fff; }

      /* custom-painted track so the fill keeps its colour when the window is inactive */
      input[type=range] { flex: 1; margin: 0; height: 13px; cursor: pointer; -webkit-appearance: none; appearance: none; background: transparent; }
      input[type=range]::-webkit-slider-runnable-track {
        height: 4px; border-radius: 2px;
        background: linear-gradient(to right, var(--accent) 0 var(--fill, 50%), #3a3a3a var(--fill, 50%) 100%);
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; margin-top: -4px; width: 11px; height: 11px; border-radius: 50%; background: #d8d8d8;
      }

      .foot { margin-top: auto; display: flex; justify-content: flex-end; gap: 8px; }
      .foot button { appearance: none; border: 0; border-radius: 4px; padding: 6px 16px; font: inherit; cursor: pointer; }
      .btn-cancel { background: #4a4a4a; color: var(--text); }
      .btn-apply { background: var(--accent); color: #1c1c1c; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>Clipify</h1>
        <span class="count" id="count"></span>
      </div>
      <div class="subtitle" id="subtitle"></div>
      <canvas id="wave" width="800" height="168"></canvas>

      <div class="section"><span class="toggle" id="split-toggle"></span> Splits</div>
      <div class="body" id="split-body">
        <div class="row">
          <label>Mode</label>
          <div class="seg" id="mode">
            <button data-val="MACRO">MACRO</button>
            <button data-val="MICRO">MICRO</button>
          </div>
        </div>
        <div class="row">
          <label>Cuts</label>
          <div class="seg" id="cutat">
            <button data-val="start">Start</button>
            <button data-val="end">End</button>
            <button data-val="both">Both</button>
          </div>
        </div>
        <div class="row">
          <label>Sens</label>
          <input type="range" id="sens" min="0" max="1" step="0.01" />
        </div>
      </div>

      <div class="section"><span class="toggle" id="strip-toggle"></span> Strip</div>
      <div class="body" id="strip-body">
        <div class="row">
          <label>Action</label>
          <div class="seg" id="action">
            <button data-val="deactivate">Deactivate</button>
            <button data-val="delete">Delete</button>
          </div>
        </div>
        <div class="row">
          <label>Target</label>
          <div class="seg" id="thresh">
            <button data-val="silence">Silence</button>
            <button data-val="quiet">Quiet</button>
            <button data-val="content">Content</button>
          </div>
        </div>
        <div class="row">
          <label>Amount</label>
          <input type="range" id="silence" min="0" max="1" step="0.01" />
        </div>
      </div>

      <div class="section"><span class="toggle" id="level-toggle"></span> Level</div>
      <div class="body" id="level-body">
        <div class="row">
          <label>Ceiling</label>
          <input type="range" id="ceiling" min="-6" max="0" step="0.5" />
          <span class="val" id="ceiling-val"></span>
        </div>
        <div class="row">
          <label>Max ±</label>
          <div class="seg" id="maxchange">
            <button data-val="6">6 dB</button>
            <button data-val="12">12 dB</button>
            <button data-val="24">24 dB</button>
          </div>
        </div>
      </div>

      <div class="foot">
        <button class="btn-cancel" id="cancel">Cancel</button>
        <button class="btn-apply" id="apply">Slice</button>
      </div>
    </div>

    <script>
      var DATA = __DATA__; // injected by slicer.ts; the controller below reads it

    </script>
  </body>
</html>
